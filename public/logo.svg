  <circle cx="20" cy="20" r="10.5" stroke="#0071e3" stroke-width="1" opacity="0.5"/>
  <!-- Letter A -->
  <path d="M14.5 27.5 L20 12.5 L25.5 27.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M16.4 22.5 H23.6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
